<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress - 3rd Person</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px 15px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
            font-size: 12px;
            border-left: 3px solid #ff6600;
        }
        #controls-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse = Look | Click to lock cursor
    </div>
    <div id="controls-status">🔒 Click screen to lock mouse</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, 2, 0);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 2, -4);
        scene.add(backLight);

        // --- SIMPLE GROUND ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x226622, roughness: 0.8 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Center marker
        const centerMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 6, 6),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x331100 })
        );
        centerMarker.position.set(0, 0, 0);
        scene.add(centerMarker);

        // --- PLAYER (cube for now) ---
        const playerGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x331122 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        player.position.set(0, 0, 0);
        scene.add(player);
        
        // Add a visual "front" indicator on player
        const frontIndicator = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 4, 4),
            new THREE.MeshStandardMaterial({ color: 0xffaa44 })
        );
        frontIndicator.position.set(0, 0.5, 0.5);
        player.add(frontIndicator);
        
        let activePlayer = player;
        let playerHeight = 0.8; // Height of player model
        
        // Try to load Striker model
        const loader = new GLTFLoader();
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.8, 0.8, 0.8);
            model.position.copy(player.position);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.remove(player);
            scene.add(model);
            activePlayer = model;
            playerHeight = 1.2; // Model is taller
            console.log('✅ Striker model loaded');
        }, undefined, (error) => console.log('Using cube fallback'));
        
        // Try to load Arena
        loader.load('arena.glb', (gltf) => {
            const arena = gltf.scene;
            arena.position.set(0, -1.2, 0);
            arena.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arena);
            scene.remove(groundPlane);
            scene.remove(gridHelper);
            console.log('✅ Arena loaded');
        }, undefined, (error) => console.log('Using ground fallback'));

        // --- MOUSE LOCK + CAMERA CONTROL ---
        let mouseX = 0;
        let mouseY = 0;
        let yaw = -Math.PI / 4;  // horizontal angle
        let pitch = 0;            // vertical angle
        let cameraDistance = 4;   // distance behind player
        
        // Camera offset for third person
        let cameraOffset = new THREE.Vector3(0, 1.5, 3); // x, y, z offset
        
        // Pointer lock
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', lockChange);
        
        function lockChange() {
            if (document.pointerLockElement === renderer.domElement) {
                document.addEventListener('mousemove', onMouseMove);
                document.getElementById('controls-status').innerHTML = '🎯 MOUSE LOCKED | WASD to move | ESC to unlock';
                document.getElementById('controls-status').style.color = '#00ff66';
            } else {
                document.removeEventListener('mousemove', onMouseMove);
                document.getElementById('controls-status').innerHTML = '🔒 Click screen to lock mouse';
                document.getElementById('controls-status').style.color = '#ffaa44';
            }
        }
        
        function onMouseMove(e) {
            yaw -= e.movementX * 0.008;
            pitch -= e.movementY * 0.008;
            // Limit pitch to prevent flipping
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
        }
        
        // --- KEYBOARD CONTROLS ---
        const keys = { w: false, s: false, a: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            // Prevent default scrolling
            if (['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(key)) {
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        let playerPos = new THREE.Vector3(0, 0, 0);
        let moveSpeed = 5;
        
        // --- UPDATE FUNCTION ---
        let lastTime = performance.now();
        
        function updateMovement(deltaTime) {
            // Calculate movement direction based on camera angle
            let moveDir = new THREE.Vector3(0, 0, 0);
            
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            if (moveDir.length() > 0) moveDir.normalize();
            
            // Rotate movement direction by yaw
            const rotatedMove = new THREE.Vector3(
                moveDir.x * Math.cos(yaw) - moveDir.z * Math.sin(yaw),
                0,
                moveDir.x * Math.sin(yaw) + moveDir.z * Math.cos(yaw)
            );
            
            // Update position
            playerPos.x += rotatedMove.x * moveSpeed * deltaTime;
            playerPos.z += rotatedMove.z * moveSpeed * deltaTime;
            
            // Boundaries
            playerPos.x = Math.max(-8, Math.min(8, playerPos.x));
            playerPos.z = Math.max(-8, Math.min(8, playerPos.z));
            
            // Apply to player model
            activePlayer.position.copy(playerPos);
            
            // Rotate player to face movement direction if moving
            if (moveDir.x !== 0 || moveDir.z !== 0) {
                const facingAngle = Math.atan2(rotatedMove.x, rotatedMove.z);
                activePlayer.rotation.y = facingAngle;
            }
            
            // Calculate camera position (third person)
            // Camera follows behind player, rotated by yaw
            const camX = playerPos.x - Math.sin(yaw) * cameraOffset.z;
            const camZ = playerPos.z - Math.cos(yaw) * cameraOffset.z;
            const camY = playerPos.y + cameraOffset.y + (playerHeight * 0.7);
            
            camera.position.set(camX, camY, camZ);
            camera.lookAt(playerPos.x, playerPos.y + playerHeight * 0.6, playerPos.z);
        }
        
        // --- ANIMATION LOOP ---
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Third Person with Mouse Lock');
        console.log('Click screen, then use WASD and mouse');
    </script>
</body>
</html>
