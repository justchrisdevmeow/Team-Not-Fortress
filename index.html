<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse moves camera
    </div>
    <div id="status">🔒 Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);

        // --- TEMPORARY GROUND (will be replaced by arena) ---
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.MeshStandardMaterial({ color: 0x226622, roughness: 0.8 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const gridHelper = new THREE.GridHelper(30, 30, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);

        // --- PLAYER ---
        let currentPlayer = null;
        let playerPos = { x: 0, z: 0 };
        let playerRotation = 0;
        
        // --- CAMERA SETTINGS ---
        let cameraAngle = 0;
        let cameraDistance = 6;
        let cameraHeight = 3;
        
        // --- LOAD STRIKER MODEL (SCALED DOWN) ---
        const loader = new GLTFLoader();
        
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            // SCALE DOWN - model was 58 units tall, scale to 1.5 units tall
            const scale = 0.025;
            model.scale.set(scale, scale, scale);
            model.position.set(0, 0, 0);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(model);
            currentPlayer = model;
            
            document.getElementById('status').innerHTML = '✅ Striker loaded (scaled) | Camera fixed';
            document.getElementById('status').style.color = '#0f0';
            console.log('✅ Model scaled down');
        }, undefined, (error) => {
            console.error('Failed to load striker.glb:', error);
            document.getElementById('status').innerHTML = '❌ striker.glb not found';
            document.getElementById('status').style.color = '#f66';
        });
        
        // --- LOAD ARENA (FIXED POSITION) ---
        loader.load('arena.glb', (gltf) => {
            const arena = gltf.scene;
            // Arena at ground level, not -1.2
            arena.position.set(0, 0, 0);
            arena.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arena);
            // Remove temporary ground
            scene.remove(groundPlane);
            scene.remove(gridHelper);
            console.log('✅ Arena loaded at ground level');
        }, undefined, (error) => {
            console.log('arena.glb not found, using ground');
        });

        // --- KEYBOARD CONTROLS ---
        const keys = { w: false, s: false, a: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (['w','s','a','d'].includes(key)) e.preventDefault();
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        // --- MOUSE CONTROL (FIXED: RIGHT = TURN RIGHT) ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && currentPlayer) {
                // FIXED: positive movementX = turn right (increase angle)
                cameraAngle += e.movementX * 0.008;
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | Move mouse to look around';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse';
                status.style.color = '#ffaa44';
            }
        });
        
        // --- MOVEMENT LOOP ---
        let lastTime = performance.now();
        let speed = 5;
        
        function update() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (currentPlayer) {
                // MOVEMENT
                let moveX = 0;
                let moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
                
                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.hypot(moveX, moveZ);
                    moveX /= len;
                    moveZ /= len;
                    
                    // Move relative to camera angle
                    const forwardX = Math.sin(cameraAngle);
                    const forwardZ = Math.cos(cameraAngle);
                    const rightX = Math.cos(cameraAngle);
                    const rightZ = -Math.sin(cameraAngle);
                    
                    playerPos.x += (moveX * rightX + moveZ * forwardX) * speed * delta;
                    playerPos.z += (moveX * rightZ + moveZ * forwardZ) * speed * delta;
                    
                    playerRotation = Math.atan2(moveX, moveZ);
                    currentPlayer.rotation.y = playerRotation;
                }
                
                // Boundaries (larger arena)
                playerPos.x = Math.max(-12, Math.min(12, playerPos.x));
                playerPos.z = Math.max(-12, Math.min(12, playerPos.z));
                
                // Update player position
                currentPlayer.position.x = playerPos.x;
                currentPlayer.position.z = playerPos.z;
                currentPlayer.position.y = 0;
                
                // THIRD PERSON CAMERA
                const camX = playerPos.x - Math.sin(cameraAngle) * cameraDistance;
                const camZ = playerPos.z - Math.cos(cameraAngle) * cameraDistance;
                const camY = cameraHeight;
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(playerPos.x, 1.2, playerPos.z);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Fixed: mouse direction, arena position, model scale');
    </script>
</body>
</html>
