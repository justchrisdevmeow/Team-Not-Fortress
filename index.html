<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress - FINAL FIX</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
            pointer-events: none;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move (camera-relative) | Mouse looks around
    </div>
    <div id="status">🔒 Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);

        // --- GLOBALS ---
        let player = null;
        let arena = null;
        let playerPos = new THREE.Vector3(0, 1, 0);
        let playerVelY = 0;
        let isGrounded = false;
        const GRAVITY = 20;
        const JUMP_POWER = 8;
        const SPEED = 5;

        let yaw = 0;        // left/right angle
        let pitch = 0;      // up/down angle
        const CAM_DIST = 5;

        const keys = { w: false, s: false, a: false, d: false, space: false };

        // --- LOAD ARENA (collision mesh) ---
        const loader = new GLTFLoader();
        let arenaReady = false;

        loader.load('arena.glb', (gltf) => {
            arena = gltf.scene;
            arena.position.set(0, 0, 0);
            arena.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            scene.add(arena);
            arenaReady = true;
            document.getElementById('status').innerHTML = '✅ Arena loaded | Click to lock';
        }, undefined, (err) => {
            console.error('arena.glb missing', err);
            document.getElementById('status').innerHTML = '❌ arena.glb not found';
        });

        // --- LOAD PLAYER ---
        loader.load('striker.glb', (gltf) => {
            player = gltf.scene;
            player.scale.set(0.025, 0.025, 0.025);
            player.traverse(child => { if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; } });
            scene.add(player);
            player.position.copy(playerPos);
        }, undefined, (err) => {
            // Fallback cube
            const geo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
            player = new THREE.Mesh(geo, mat);
            player.castShadow = true;
            scene.add(player);
            player.position.copy(playerPos);
        });

        // --- KEYBOARD ---
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = true;
            if (k === 's') keys.s = true;
            if (k === 'a') keys.a = true;
            if (k === 'd') keys.d = true;
            if (k === ' ') { keys.space = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = false;
            if (k === 's') keys.s = false;
            if (k === 'a') keys.a = false;
            if (k === 'd') keys.d = false;
            if (k === ' ') keys.space = false;
        });

        // --- MOUSE (Y NOT INVERTED) ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                yaw += e.movementX * 0.008;      // right mouse = turn right
                pitch += e.movementY * 0.008;    // up mouse = look up (NOT inverted)
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            }
        });
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | WASD moves | Space jumps';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse';
                status.style.color = '#ffaa44';
            }
        });

        // --- RAYCAST GROUND (against arena) ---
        function getGroundY(pos) {
            if (!arena) return -10; // fallback, but arena should exist
            const raycaster = new THREE.Raycaster(
                new THREE.Vector3(pos.x, pos.y + 1.5, pos.z),
                new THREE.Vector3(0, -1, 0),
                0,
                5
            );
            const hits = raycaster.intersectObject(arena, true);
            if (hits.length) return hits[0].point.y;
            return -10;
        }

        // --- ANIMATION LOOP ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;

            if (player && arena) {
                // GRAVITY & GROUND
                const groundY = getGroundY(playerPos);
                const onGround = playerPos.y <= groundY + 0.3;
                if (onGround) {
                    playerVelY = 0;
                    playerPos.y = groundY + 0.1;
                    if (keys.space) {
                        playerVelY = JUMP_POWER;
                        keys.space = false;
                    }
                } else {
                    playerVelY -= GRAVITY * delta;
                    playerPos.y += playerVelY * delta;
                }

                // MOVEMENT (camera-relative)
                let moveX = 0, moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.hypot(moveX, moveZ);
                    moveX /= len;
                    moveZ /= len;
                    // Camera forward and right vectors
                    const forwardX = Math.sin(yaw);
                    const forwardZ = Math.cos(yaw);
                    const rightX = Math.cos(yaw);
                    const rightZ = -Math.sin(yaw);
                    let dx = (moveX * rightX + moveZ * forwardX) * SPEED * delta;
                    let dz = (moveX * rightZ + moveZ * forwardZ) * SPEED * delta;
                    playerPos.x += dx;
                    playerPos.z += dz;
                    // Simple boundary (optional)
                    playerPos.x = Math.max(-14, Math.min(14, playerPos.x));
                    playerPos.z = Math.max(-14, Math.min(14, playerPos.z));
                    // Rotate player to face movement direction
                    const angle = Math.atan2(moveX, moveZ);
                    player.rotation.y = angle;
                }

                player.position.copy(playerPos);

                // CAMERA (third-person)
                const camX = playerPos.x - Math.sin(yaw) * CAM_DIST;
                const camZ = playerPos.z - Math.cos(yaw) * CAM_DIST;
                const camY = playerPos.y + 1.5 + pitch * 2;
                camera.position.set(camX, camY, camZ);
                camera.lookAt(playerPos.x, playerPos.y + 1, playerPos.z);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
