<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse looks around
    </div>
    <div id="status">🔒 Loading arena...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);

        // --- PLAYER ---
        let currentPlayer = null;
        let playerPos = { x: 0, y: 1, z: 0 };
        let playerVelocityY = 0;
        let isGrounded = false;
        let gravity = 20;
        let jumpPower = 8;
        
        // --- CAMERA SETTINGS ---
        let cameraAngleX = 0;
        let cameraAngleY = 0;
        let cameraDistance = 5;
        
        // --- ARENA (collision mesh) ---
        let arenaMesh = null;
        let arenaLoaded = false;
        
        // --- LOAD STRIKER MODEL ---
        const loader = new GLTFLoader();
        
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            const scale = 0.025;
            model.scale.set(scale, scale, scale);
            model.position.set(0, 0, 0);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(model);
            currentPlayer = model;
            currentPlayer.position.copy(playerPos);
            
            document.getElementById('status').innerHTML = '✅ Striker loaded | Waiting for arena...';
            document.getElementById('status').style.color = '#ffaa44';
        }, undefined, (error) => {
            console.error('Failed to load striker.glb:', error);
            document.getElementById('status').innerHTML = '❌ striker.glb not found';
            document.getElementById('status').style.color = '#f66';
        });
        
        // --- LOAD ARENA (for collision) ---
        loader.load('arena.glb', (gltf) => {
            arenaMesh = gltf.scene;
            arenaMesh.position.set(0, 0, 0);
            arenaMesh.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arenaMesh);
            arenaLoaded = true;
            console.log('✅ Arena loaded');
            document.getElementById('status').innerHTML = '✅ Arena loaded | WASD to move';
            document.getElementById('status').style.color = '#0f0';
        }, undefined, (error) => {
            console.error('Failed to load arena.glb:', error);
            document.getElementById('status').innerHTML = '❌ arena.glb not found - cannot collide';
            document.getElementById('status').style.color = '#f66';
        });

        // --- KEYBOARD CONTROLS ---
        const keys = { w: false, s: false, a: false, d: false, space: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
            if (key === ' ') keys.space = false;
        });
        
        // --- MOUSE CONTROL (not inverted, as you had) ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && currentPlayer) {
                cameraAngleX += e.movementX * 0.008;
                cameraAngleY += e.movementY * 0.008;
                cameraAngleY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleY));
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | WASD moves | Space jumps';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse';
                status.style.color = '#ffaa44';
            }
        });
        
        // --- RAYCAST COLLISION AGAINST ARENA MESH ---
        function getGroundAndCollision(pos) {
            if (!arenaMesh || !arenaLoaded) {
                return { groundY: -10, colliding: false };
            }
            
            // Raycast downward to find ground
            const downRay = new THREE.Raycaster(
                new THREE.Vector3(pos.x, pos.y + 2, pos.z),
                new THREE.Vector3(0, -1, 0),
                0,
                5
            );
            const downHits = downRay.intersectObject(arenaMesh, true);
            
            let groundY = -10;
            if (downHits.length > 0) {
                groundY = downHits[0].point.y;
            }
            
            // Raycast in 4 directions for wall collision (optional)
            return { groundY, colliding: false };
        }
        
        // --- MOVEMENT LOOP ---
        let lastTime = performance.now();
        let speed = 5;
        
        function update() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (currentPlayer && arenaLoaded) {
                // --- GRAVITY AND GROUND COLLISION ---
                const { groundY } = getGroundAndCollision(playerPos);
                const onGround = playerPos.y <= groundY + 0.3;
                
                if (onGround) {
                    playerVelocityY = 0;
                    playerPos.y = groundY + 0.1;
                    isGrounded = true;
                    
                    if (keys.space) {
                        playerVelocityY = jumpPower;
                        isGrounded = false;
                        keys.space = false;
                    }
                } else {
                    playerVelocityY -= gravity * delta;
                    playerPos.y += playerVelocityY * delta;
                    isGrounded = false;
                }
                
                // --- MOVEMENT (FIXED: W forward, S back, A left, D right) ---
                let moveX = 0;
                let moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
                
                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.hypot(moveX, moveZ);
                    moveX /= len;
                    moveZ /= len;
                    
                    const forwardX = Math.cos(cameraAngleX);
                    const forwardZ = Math.sin(cameraAngleX);
                    const rightX = -Math.sin(cameraAngleX);
                    const rightZ = Math.cos(cameraAngleX);
                    
                    let newX = playerPos.x + (moveX * rightX + moveZ * forwardX) * speed * delta;
                    let newZ = playerPos.z + (moveX * rightZ + moveZ * forwardZ) * speed * delta;
                    
                    playerPos.x = newX;
                    playerPos.z = newZ;
                    
                    const moveAngle = Math.atan2(moveX, moveZ);
                    currentPlayer.rotation.y = moveAngle;
                }
                
                currentPlayer.position.copy(playerPos);
                
                // --- CAMERA ---
                const camX = playerPos.x - Math.sin(cameraAngleX) * cameraDistance;
                const camZ = playerPos.z - Math.cos(cameraAngleX) * cameraDistance;
                const camY = playerPos.y + 1.5 + cameraAngleY * 2;
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(playerPos.x, playerPos.y + 1, playerPos.z);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Raycasting against arena.glb for collision');
    </script>
</body>
</html>
