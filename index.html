<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Team Not Fortress</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; cursor: crosshair; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            border-left: 4px solid #f90;
        }
        #health {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #f66;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            font-family: monospace;
            font-size: 18px;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ff0;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #aaa;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">⚔️ TEAM NOT FORTRESS | STRIKER CLASS ⚔️</div>
    <div id="health">❤️ HEALTH: 100</div>
    <div id="status">🔫 READY</div>
    <div class="controls-hint">WASD = MOVE | MOUSE = AIM | CLICK = FIRE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(0, -2, 0);
        scene.add(fillLight);
        const rimLight = new THREE.PointLight(0xffaa66, 0.4);
        rimLight.position.set(-2, 1, -3);
        scene.add(rimLight);

        // --- GAME STATE ---
        const keyState = { w: false, s: false, a: false, d: false };
        let health = 100;
        let score = 0;
        
        // Player
        let playerModel = null;
        let playerPosition = new THREE.Vector3(0, 0, 0);
        let playerRotation = 0;
        
        // Camera offset for 3rd person (behind player)
        let cameraOffset = new THREE.Vector3(-3, 2, 4);
        
        // Enemy
        let enemy = null;
        let enemyHealth = 50;
        let enemySpeed = 2.5;
        
        // Movement
        let moveSpeed = 5.0;
        
        // Mouse look
        let targetAngle = 0;
        
        // UI
        const healthDiv = document.getElementById('health');
        const statusDiv = document.getElementById('status');
        
        // Raycaster for shooting
        const raycaster = new THREE.Raycaster();
        
        // --- LOAD MODELS ---
        const loader = new GLTFLoader();
        
        // Simple ground plane as fallback
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x336633, roughness: 0.8 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Load Arena
        loader.load('arena.glb', (gltf) => {
            const arena = gltf.scene;
            arena.position.set(0, -1.5, 0);
            arena.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arena);
            console.log('Arena loaded');
            
            // Position player at center of arena on ground
            playerPosition.set(0, 0, 0);
            if (playerModel) {
                playerModel.position.copy(playerPosition);
            }
            camera.position.copy(playerPosition.clone().add(cameraOffset));
            
            // Remove fallback ground
            scene.remove(groundPlane);
        }, undefined, (error) => {
            console.warn('Arena not found, using ground plane');
        });
        
        // Load Striker (player model)
        loader.load('striker.glb', (gltf) => {
            playerModel = gltf.scene;
            playerModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            playerModel.scale.set(0.8, 0.8, 0.8);
            playerModel.position.copy(playerPosition);
            scene.add(playerModel);
            console.log('Striker loaded');
            statusDiv.innerHTML = '✅ READY | WASD MOVE | CLICK SHOOT';
        }, undefined, (error) => console.error('Striker error:', error));
        
        // Create enemy (red cube for now)
        const enemyGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const enemyMaterial = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x441122 });
        enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
        enemy.position.set(3, 0, 2);
        enemy.castShadow = true;
        scene.add(enemy);
        
        // Add some particles for atmosphere
        const particleCount = 300;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 25;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 20;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        
        // --- CONTROLS ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 's') keyState.s = true;
            if (key === 'a') keyState.a = true;
            if (key === 'd') keyState.d = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 's') keyState.s = false;
            if (key === 'a') keyState.a = false;
            if (key === 'd') keyState.d = false;
        });
        
        // Mouse look for 3rd person
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                targetAngle += e.movementX * 0.008;
            }
        });
        
        // Pointer lock
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                statusDiv.innerHTML = '🎯 AIM LOCKED | CLICK TO SHOOT';
            } else {
                statusDiv.innerHTML = '🔒 CLICK SCREEN TO LOCK AIM';
            }
        });
        
        // Shooting
        window.addEventListener('click', () => {
            if (document.pointerLockElement !== renderer.domElement) return;
            if (health <= 0) return;
            
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObject(enemy);
            if (intersects.length > 0) {
                enemyHealth -= 25;
                statusDiv.innerHTML = '💥 HIT!';
                setTimeout(() => {
                    if (statusDiv.innerHTML === '💥 HIT!') statusDiv.innerHTML = '🔫 READY';
                }, 200);
                if (enemyHealth <= 0) {
                    score++;
                    enemyHealth = 50 + Math.floor(score * 10);
                    enemy.position.set((Math.random() - 0.5) * 6, 0, (Math.random() - 0.5) * 6);
                    statusDiv.innerHTML = `💀 DEFEATED! SCORE: ${score}`;
                    setTimeout(() => statusDiv.innerHTML = '🔫 READY', 1500);
                    health = Math.min(100, health + 10);
                    updateHealthUI();
                }
            } else {
                statusDiv.innerHTML = '💨 MISS!';
                setTimeout(() => {
                    if (statusDiv.innerHTML === '💨 MISS!') statusDiv.innerHTML = '🔫 READY';
                }, 200);
            }
        });
        
        function updateHealthUI() {
            healthDiv.innerHTML = `❤️ HEALTH: ${Math.max(0, health)}`;
            if (health <= 0) {
                healthDiv.innerHTML = '💀 YOU DIED 💀';
                statusDiv.innerHTML = 'GAME OVER - REFRESH TO PLAY';
            }
        }
        
        // --- UPDATE MOVEMENT ---
        function updateMovement(deltaTime) {
            if (health <= 0) return;
            
            const actualSpeed = moveSpeed * deltaTime;
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.w) move.z -= 1;
            if (keyState.s) move.z += 1;
            if (keyState.a) move.x -= 1;
            if (keyState.d) move.x += 1;
            if (move.length() > 0) move.normalize();
            
            // Move relative to camera direction
            const forward = new THREE.Vector3(-Math.sin(targetAngle), 0, -Math.cos(targetAngle));
            const right = new THREE.Vector3(Math.cos(targetAngle), 0, -Math.sin(targetAngle));
            
            let deltaPos = new THREE.Vector3(0, 0, 0);
            deltaPos.addScaledVector(forward, move.z);
            deltaPos.addScaledVector(right, move.x);
            deltaPos.multiplyScalar(actualSpeed);
            
            playerPosition.x += deltaPos.x;
            playerPosition.z += deltaPos.z;
            
            // Boundaries
            playerPosition.x = Math.max(-8, Math.min(8, playerPosition.x));
            playerPosition.z = Math.max(-7, Math.min(7, playerPosition.z));
            
            // Update player model position and rotation
            if (playerModel) {
                playerModel.position.copy(playerPosition);
                if (move.x !== 0 || move.z !== 0) {
                    playerRotation = Math.atan2(move.x, move.z);
                    playerModel.rotation.y = playerRotation;
                }
            }
            
            // Update camera position (3rd person behind player)
            const angle = targetAngle;
            const cameraX = playerPosition.x + Math.sin(angle) * cameraOffset.z + Math.cos(angle) * cameraOffset.x;
            const cameraZ = playerPosition.z + Math.cos(angle) * cameraOffset.z - Math.sin(angle) * cameraOffset.x;
            camera.position.set(cameraX, playerPosition.y + cameraOffset.y, cameraZ);
            camera.lookAt(playerPosition);
        }
        
        // --- ENEMY AI ---
        function updateEnemy(deltaTime) {
            if (health <= 0) return;
            const direction = new THREE.Vector3().subVectors(playerPosition, enemy.position).normalize();
            enemy.position.x += direction.x * enemySpeed * deltaTime;
            enemy.position.z += direction.z * enemySpeed * deltaTime;
            enemy.position.x = Math.max(-7, Math.min(7, enemy.position.x));
            enemy.position.z = Math.max(-6, Math.min(6, enemy.position.z));
            enemy.lookAt(playerPosition);
            
            const dist = playerPosition.distanceTo(enemy.position);
            if (dist < 1.2 && health > 0) {
                health -= 25 * deltaTime;
                updateHealthUI();
                if (health <= 0) {
                    statusDiv.innerHTML = '💀 GAME OVER 💀';
                }
                enemy.position.x += direction.x * 0.8;
                enemy.position.z += direction.z * 0.8;
            }
        }
        
        // --- ANIMATION LOOP ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            updateMovement(delta);
            updateEnemy(delta);
            
            // Animate particles
            particles.rotation.y += 0.5 * delta;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - 3rd Person Mode Loaded');
    </script>
</body>
</html>
