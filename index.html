<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse looks around
    </div>
    <div id="status">🔒 Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);

        // --- PLAYER ---
        let currentPlayer = null;
        let playerPos = { x: 0, y: 1, z: 0 };
        let playerVelocityY = 0;
        let gravity = 20;
        let jumpPower = 8;
        
        // --- CAMERA SETTINGS ---
        let cameraAngleX = 0;
        let cameraAngleY = 0;
        let cameraDistance = 5;
        
        // --- CREATE VISIBLE GROUND (so we can see and collide with it) ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a8c3a, roughness: 0.8 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Grid helper for reference
        const gridHelper = new THREE.GridHelper(30, 20, 0x88ff88, 0x448844);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        // --- COLLISION GROUND SET (so raycast always works) ---
        let collisionGround = groundPlane;
        
        // --- LOAD STRIKER MODEL ---
        const loader = new GLTFLoader();
        
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            const scale = 0.025;
            model.scale.set(scale, scale, scale);
            model.position.set(0, 0, 0);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(model);
            currentPlayer = model;
            currentPlayer.position.copy(playerPos);
            
            document.getElementById('status').innerHTML = '✅ Striker loaded | WASD to move';
            document.getElementById('status').style.color = '#0f0';
        }, undefined, (error) => {
            console.error('Failed to load striker.glb:', error);
            // Create cube as fallback
            const geo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
            const cube = new THREE.Mesh(geo, mat);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            currentPlayer = cube;
            currentPlayer.position.copy(playerPos);
            document.getElementById('status').innerHTML = '⚠️ Using fallback cube | WASD to move';
            document.getElementById('status').style.color = '#ffaa44';
        });
        
        // --- LOAD ARENA (if exists, replaces ground for collision) ---
        loader.load('arena.glb', (gltf) => {
            collisionGround = gltf.scene;
            collisionGround.position.set(0, 0, 0);
            collisionGround.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(collisionGround);
            console.log('✅ Arena loaded');
        }, undefined, (error) => {
            console.log('arena.glb not found, using plane ground');
        });

        // --- KEYBOARD CONTROLS ---
        const keys = { w: false, s: false, a: false, d: false, space: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
            if (key === ' ') keys.space = false;
        });
        
        // --- MOUSE CONTROL (Y NOT INVERTED - as you requested) ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && currentPlayer) {
                cameraAngleX += e.movementX * 0.008;
                cameraAngleY += e.movementY * 0.008;  // NOT inverted
                cameraAngleY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleY));
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | WASD moves | Space jumps';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse';
                status.style.color = '#ffaa44';
            }
        });
        
        // --- RAYCASTING COLLISION (ALWAYS WORKS) ---
        function getGroundY(pos) {
            let groundY = -0.5;
            
            if (collisionGround) {
                const rayOrigin = new THREE.Vector3(pos.x, pos.y + 1.5, pos.z);
                const rayDirection = new THREE.Vector3(0, -1, 0);
                const raycaster = new THREE.Raycaster(rayOrigin, rayDirection, 0, 3);
                const intersects = raycaster.intersectObject(collisionGround, true);
                
                if (intersects.length > 0) {
                    groundY = intersects[0].point.y;
                }
            }
            
            return groundY;
        }
        
        // --- MOVEMENT LOOP ---
        let lastTime = performance.now();
        let speed = 5;
        
        function update() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (currentPlayer) {
                // --- GRAVITY AND COLLISION (FIXED) ---
                const groundY = getGroundY(playerPos);
                const onGround = playerPos.y <= groundY + 0.3;
                
                if (onGround) {
                    playerVelocityY = 0;
                    playerPos.y = groundY + 0.1;
                    
                    if (keys.space) {
                        playerVelocityY = jumpPower;
                        keys.space = false;
                    }
                } else {
                    playerVelocityY -= gravity * delta;
                    playerPos.y += playerVelocityY * delta;
                }
                
                // --- MOVEMENT (FIXED: W=forward, S=back, A=left, D=right) ---
                let moveX = 0;
                let moveZ = 0;
                if (keys.w) moveZ -= 1;
                if (keys.s) moveZ += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;
                
                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.hypot(moveX, moveZ);
                    moveX /= len;
                    moveZ /= len;
                    
                    // FIXED: Correct forward/right vectors
                    const forwardX = Math.cos(cameraAngleX);
                    const forwardZ = Math.sin(cameraAngleX);
                    const rightX = -Math.sin(cameraAngleX);
                    const rightZ = Math.cos(cameraAngleX);
                    
                    let newX = playerPos.x + (moveX * rightX + moveZ * forwardX) * speed * delta;
                    let newZ = playerPos.z + (moveX * rightZ + moveZ * forwardZ) * speed * delta;
                    
                    // Boundary
                    newX = Math.max(-14, Math.min(14, newX));
                    newZ = Math.max(-14, Math.min(14, newZ));
                    
                    playerPos.x = newX;
                    playerPos.z = newZ;
                    
                    // Rotate player to face movement
                    const moveAngle = Math.atan2(moveX, moveZ);
                    currentPlayer.rotation.y = moveAngle;
                }
                
                // Apply position
                currentPlayer.position.copy(playerPos);
                
                // --- THIRD PERSON CAMERA ---
                const camX = playerPos.x - Math.sin(cameraAngleX) * cameraDistance;
                const camZ = playerPos.z - Math.cos(cameraAngleX) * cameraDistance;
                const camY = playerPos.y + 1.5 + (cameraAngleY * 2);
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(playerPos.x, playerPos.y + 1, playerPos.z);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - FULLY FIXED: movement, camera (Y not inverted), gravity, collision');
    </script>
</body>
</html>
