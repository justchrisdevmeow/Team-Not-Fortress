<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse looks around
    </div>
    <div id="status">🔒 Loading...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);

        // --- PLAYER ---
        let currentPlayer = null;
        let playerPos = { x: 0, y: 0, z: 0 };
        let playerVelocityY = 0;
        let isGrounded = false;
        let gravity = 20;
        let jumpPower = 8;
        
        // --- CAMERA SETTINGS ---
        let cameraAngleX = 0;  // left/right
        let cameraAngleY = 0;  // up/down
        let cameraDistance = 5;
        
        // --- LOAD STRIKER MODEL ---
        const loader = new GLTFLoader();
        
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            const scale = 0.025;
            model.scale.set(scale, scale, scale);
            model.position.set(0, 0, 0);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(model);
            currentPlayer = model;
            
            document.getElementById('status').innerHTML = '✅ Striker loaded | WASD to move';
            document.getElementById('status').style.color = '#0f0';
        }, undefined, (error) => {
            console.error('Failed to load striker.glb:', error);
            document.getElementById('status').innerHTML = '❌ striker.glb not found';
            document.getElementById('status').style.color = '#f66';
        });
        
        // --- LOAD ARENA (center it at 0,0,0) ---
        let arenaMesh = null;
        loader.load('arena.glb', (gltf) => {
            arenaMesh = gltf.scene;
            // Center the arena at origin
            arenaMesh.position.set(0, 0, 0);
            arenaMesh.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arenaMesh);
            console.log('✅ Arena loaded at center');
        }, undefined, (error) => {
            console.log('arena.glb not found');
        });

        // --- KEYBOARD CONTROLS (CORRECT: W=forward, S=back, A=left, D=right) ---
        const keys = { w: false, s: false, a: false, d: false, space: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
            if (['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(key)) {
                e.preventDefault();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
            if (key === ' ') keys.space = false;
        });
        
        // --- MOUSE CONTROL (FIXED: correct direction) ---
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement && currentPlayer) {
                // Horizontal: move mouse right = look right (increase angle)
                cameraAngleX += e.movementX * 0.008;
                // Vertical: move mouse up = look up
                cameraAngleY += e.movementY * 0.008;
                cameraAngleY = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, cameraAngleY));
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | WASD moves | Space jumps';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse';
                status.style.color = '#ffaa44';
            }
        });
        
        // --- RAYCASTING COLLISION ---
        function checkCollisionAndGround(pos) {
            let groundY = -0.5;
            let foundGround = false;
            
            if (arenaMesh) {
                // Raycast downward to find ground
                const rayOrigin = new THREE.Vector3(pos.x, pos.y + 2, pos.z);
                const rayDirection = new THREE.Vector3(0, -1, 0);
                const raycaster = new THREE.Raycaster(rayOrigin, rayDirection, 0, 5);
                const intersects = raycaster.intersectObject(arenaMesh, true);
                
                if (intersects.length > 0) {
                    groundY = intersects[0].point.y;
                    foundGround = true;
                }
            }
            
            return { groundY, foundGround };
        }
        
        // --- MOVEMENT LOOP ---
        let lastTime = performance.now();
        let speed = 5;
        
        function update() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            if (currentPlayer) {
                // --- GRAVITY AND COLLISION ---
                const groundCheck = checkCollisionAndGround(playerPos);
                const groundY = groundCheck.groundY;
                const onGround = playerPos.y <= groundY + 0.2;
                
                if (onGround) {
                    playerVelocityY = 0;
                    playerPos.y = groundY + 0.1;
                    isGrounded = true;
                    
                    // Jump
                    if (keys.space) {
                        playerVelocityY = jumpPower;
                        isGrounded = false;
                        keys.space = false; // Single jump
                    }
                } else {
                    playerVelocityY -= gravity * delta;
                    playerPos.y += playerVelocityY * delta;
                    isGrounded = false;
                }
                
                // --- MOVEMENT (CORRECT: W=forward, S=backward) ---
                let moveX = 0;
                let moveZ = 0;
                if (keys.w) moveZ -= 1;  // W = forward
                if (keys.s) moveZ += 1;  // S = backward
                if (keys.a) moveX -= 1;  // A = left
                if (keys.d) moveX += 1;  // D = right
                
                if (moveX !== 0 || moveZ !== 0) {
                    const len = Math.hypot(moveX, moveZ);
                    moveX /= len;
                    moveZ /= len;
                    
                    // Move relative to camera direction
                    const forwardX = Math.sin(cameraAngleX);
                    const forwardZ = Math.cos(cameraAngleX);
                    const rightX = Math.cos(cameraAngleX);
                    const rightZ = -Math.sin(cameraAngleX);
                    
                    let newX = playerPos.x + (moveX * rightX + moveZ * forwardX) * speed * delta;
                    let newZ = playerPos.z + (moveX * rightZ + moveZ * forwardZ) * speed * delta;
                    
                    // Simple boundary (can be enhanced with mesh collision)
                    newX = Math.max(-12, Math.min(12, newX));
                    newZ = Math.max(-12, Math.min(12, newZ));
                    
                    playerPos.x = newX;
                    playerPos.z = newZ;
                    
                    // Rotate player model to face movement direction
                    const moveAngle = Math.atan2(moveX, moveZ);
                    currentPlayer.rotation.y = moveAngle;
                }
                
                // Update player position
                currentPlayer.position.x = playerPos.x;
                currentPlayer.position.z = playerPos.z;
                currentPlayer.position.y = playerPos.y;
                
                // --- THIRD PERSON CAMERA ---
                // Camera orbits around player
                const camX = playerPos.x - Math.sin(cameraAngleX) * cameraDistance;
                const camZ = playerPos.z - Math.cos(cameraAngleX) * cameraDistance;
                const camY = playerPos.y + 1.5 + cameraAngleY * 2;
                
                camera.position.set(camX, camY, camZ);
                camera.lookAt(playerPos.x, playerPos.y + 1, playerPos.z);
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Fixed: correct controls, gravity, raycast ground');
    </script>
</body>
</html>
