<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; cursor: crosshair; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
        }
        #status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffaa44;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        ⚔️ TEAM NOT FORTRESS ⚔️<br>
        WASD = Move | Mouse moves camera
    </div>
    <div id="status">🔒 Camera follows behind player</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(0, 2, 0);
        scene.add(fillLight);

        // --- HELPER VISUALS ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x226622, roughness: 0.8 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- PLAYER (simple cube so you can see it) ---
        const playerGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        player.position.set(0, 0, 0);
        scene.add(player);
        
        // Try to load Striker model
        const loader = new GLTFLoader();
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.7, 0.7, 0.7);
            model.position.copy(player.position);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                }
            });
            scene.remove(player);
            scene.add(model);
            window.playerModel = model;
            console.log('✅ Striker loaded');
        });
        
        // Try to load Arena
        loader.load('arena.glb', (gltf) => {
            const arena = gltf.scene;
            arena.position.set(0, -1.2, 0);
            scene.add(arena);
            scene.remove(groundPlane);
            scene.remove(gridHelper);
            console.log('✅ Arena loaded');
        });

        // --- VARIABLES ---
        let currentPlayer = player;
        let playerPos = { x: 0, z: 0 };
        let playerRotation = 0;
        
        // Camera: third person, at head height
        let cameraAngle = 0;
        let cameraDistance = 3.5;
        let cameraHeight = 1.5;  // HEAD HEIGHT (not feet!)
        
        // Movement keys
        const keys = { w: false, s: false, a: false, d: false };
        
        // --- KEYBOARD ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        // --- MOUSE CONTROL FOR CAMERA ANGLE ---
        let mouseX = 0;
        let mouseY = 0;
        
        // Simple: mouse moves camera angle around player
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                cameraAngle += e.movementX * 0.01;
            }
        });
        
        // Click to lock mouse
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        document.addEventListener('pointerlockchange', () => {
            const status = document.getElementById('status');
            if (document.pointerLockElement === renderer.domElement) {
                status.innerHTML = '🎯 Mouse locked | WASD to move';
                status.style.color = '#0f0';
            } else {
                status.innerHTML = '🔒 Click to lock mouse and move camera';
                status.style.color = '#ffaa44';
            }
        });
        
        // --- UPDATE PLAYER MODEL REFERENCE ---
        setInterval(() => {
            if (window.playerModel && window.playerModel !== currentPlayer) {
                currentPlayer = window.playerModel;
                currentPlayer.position.set(playerPos.x, 0, playerPos.z);
            }
        }, 100);
        
        // --- MOVEMENT LOOP ---
        let lastTime = performance.now();
        let speed = 4;
        
        function update() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // MOVEMENT (W = forward, S = backward)
            let moveX = 0;
            let moveZ = 0;
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                
                playerPos.x += moveX * speed * delta;
                playerPos.z += moveZ * speed * delta;
                
                // Rotate player to face movement direction
                playerRotation = Math.atan2(moveX, moveZ);
                currentPlayer.rotation.y = playerRotation;
            }
            
            // Boundaries
            playerPos.x = Math.max(-7, Math.min(7, playerPos.x));
            playerPos.z = Math.max(-7, Math.min(7, playerPos.z));
            
            // Update player position
            currentPlayer.position.x = playerPos.x;
            currentPlayer.position.z = playerPos.z;
            currentPlayer.position.y = 0;
            
            // THIRD PERSON CAMERA (behind player, at HEAD HEIGHT)
            const camX = playerPos.x - Math.sin(cameraAngle) * cameraDistance;
            const camZ = playerPos.z - Math.cos(cameraAngle) * cameraDistance;
            const camY = cameraHeight;  // HEAD LEVEL
            
            camera.position.set(camX, camY, camZ);
            camera.lookAt(playerPos.x, cameraHeight * 0.7, playerPos.z);
            
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        
        update();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Fixed: W = forward, S = backward, camera at head height');
    </script>
</body>
</html>
