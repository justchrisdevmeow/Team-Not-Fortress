<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Not Fortress - Movement Test</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: black;
            color: lime;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>Team Not Fortress</strong><br>
        WASD to move | Mouse to rotate camera
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- BASIC SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- SIMPLE CONTROLS (OrbitControls - just to test) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);
        
        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x4466cc, 0.5);
        backLight.position.set(0, 2, -3);
        scene.add(backLight);
        
        // --- GROUND (so you can see movement) ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x226622, roughness: 0.8, metalness: 0.1 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- MARKER AT CENTER (so you know where you are) ---
        const centerMarker = new THREE.Mesh(
            new THREE.SphereGeometry(0.2, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x442200 })
        );
        centerMarker.position.set(0, 0, 0);
        scene.add(centerMarker);
        
        // --- PLAYER (simple cube for now, replace with model later) ---
        const playerGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x331122 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.castShadow = true;
        player.position.set(0, 0, 0);
        scene.add(player);
        
        // Add a simple arrow to show front direction
        const arrowHelper = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0.5, 0), 0.8, 0xff3366);
        player.add(arrowHelper);
        
        // Try to load Striker model if exists
        const loader = new GLTFLoader();
        loader.load('striker.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.8, 0.8, 0.8);
            model.position.copy(player.position);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.remove(player);
            scene.add(model);
            window.playerModel = model;
            console.log('Striker model loaded!');
        }, undefined, (error) => {
            console.log('Striker model not found, using cube');
            window.playerModel = player;
        });
        
        // Try to load Arena
        loader.load('arena.glb', (gltf) => {
            const arena = gltf.scene;
            arena.position.set(0, -1.5, 0);
            arena.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(arena);
            scene.remove(groundPlane);
            scene.remove(gridHelper);
            console.log('Arena loaded!');
        }, undefined, (error) => {
            console.log('Arena not found, using ground plane');
        });
        
        // --- SIMPLE KEYBOARD CONTROLS (direct) ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (keys.hasOwnProperty(key)) keys[key] = true;
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key;
            if (keys.hasOwnProperty(key)) keys[key] = false;
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
        });
        
        let currentPlayer = player;
        let moveSpeed = 4;
        
        // Update player model reference once loaded
        setInterval(() => {
            if (window.playerModel && window.playerModel !== currentPlayer) {
                currentPlayer = window.playerModel;
                console.log('Switched to model');
            }
        }, 100);
        
        // --- ANIMATION LOOP ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Movement
            let moveX = 0;
            let moveZ = 0;
            if (keys.w || keys.ArrowUp) moveZ -= 1;
            if (keys.s || keys.ArrowDown) moveZ += 1;
            if (keys.a || keys.ArrowLeft) moveX -= 1;
            if (keys.d || keys.ArrowRight) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                // Normalize diagonal movement
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                
                currentPlayer.position.x += moveX * moveSpeed * delta;
                currentPlayer.position.z += moveZ * moveSpeed * delta;
                
                // Rotate player to face movement direction
                const angle = Math.atan2(moveX, moveZ);
                currentPlayer.rotation.y = angle;
            }
            
            // Update camera to follow player
            camera.position.x = currentPlayer.position.x + 4;
            camera.position.z = currentPlayer.position.z + 5;
            camera.position.y = 3;
            controls.target.copy(currentPlayer.position);
            controls.update();
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Team Not Fortress - Movement Test');
        console.log('Use WASD or Arrow keys to move the cube/model');
    </script>
</body>
</html>
